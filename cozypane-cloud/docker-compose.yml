services:
  traefik:
    image: traefik:latest
    restart: unless-stopped
    environment:
      - CF_API_EMAIL=${CF_API_EMAIL}
      - CF_API_KEY=${CF_API_KEY}
      - DOCKER_API_VERSION=1.45
    command:
      - "--log.level=INFO"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-public"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge=true"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.cloudflare.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      # Default wildcard cert for all *.cozypane.com subdomains
      - "--entrypoints.websecure.http.tls.certresolver=cloudflare"
      - "--entrypoints.websecure.http.tls.domains[0].main=${DOMAIN:-cozypane.com}"
      - "--entrypoints.websecure.http.tls.domains[0].sans=*.${DOMAIN:-cozypane.com}"
    ports:
      - "80:80"
      - "443:443"
      # Dashboard only accessible via SSH tunnel: ssh -L 8080:localhost:8080 root@server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      # Wildcard cert router — requests *.cozypane.com via DNS challenge
      - "traefik.http.routers.wildcard.rule=HostRegexp(`.+\\.${DOMAIN:-cozypane.com}`)"
      - "traefik.http.routers.wildcard.priority=1"
      - "traefik.http.routers.wildcard.tls=true"
      - "traefik.http.routers.wildcard.tls.certresolver=cloudflare"
      - "traefik.http.routers.wildcard.tls.domains[0].main=${DOMAIN:-cozypane.com}"
      - "traefik.http.routers.wildcard.tls.domains[0].sans=*.${DOMAIN:-cozypane.com}"
      - "traefik.http.routers.wildcard.entrypoints=websecure"
      - "traefik.http.routers.wildcard.service=dashboard-svc"
      - "traefik.http.services.dashboard-svc.loadbalancer.server.port=8080"

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://cozypane:secret@postgres:5432/cozypane}
      - JWT_SECRET=${JWT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - DOMAIN=${DOMAIN:-cozypane.com}
      - ADMIN_GITHUB_CLIENT_ID=${ADMIN_GITHUB_CLIENT_ID}
      - ADMIN_GITHUB_CLIENT_SECRET=${ADMIN_GITHUB_CLIENT_SECRET}
      - NODE_ENV=production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cozypane-api.rule=Host(`api.${DOMAIN:-cozypane.com}`) || Host(`admin.${DOMAIN:-cozypane.com}`)"
      - "traefik.http.routers.cozypane-api.tls=true"
      - "traefik.http.routers.cozypane-api.entrypoints=websecure"
      - "traefik.http.services.cozypane-api.loadbalancer.server.port=3000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cozypane
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: cozypane
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cozypane -d cozypane"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  traefik-certs:

networks:
  traefik-public:
    name: traefik-public
    driver: bridge
  internal:
    driver: bridge
