services:
  traefik:
    image: traefik:latest
    restart: unless-stopped
    environment:
      - CF_API_EMAIL=${CF_API_EMAIL}
      - CF_API_KEY=${CF_API_KEY}
      - DOCKER_API_VERSION=1.45
    command:
      - "--log.level=INFO"
      # Dashboard disabled — previously exposed via a wildcard HostRegexp router
      # that leaked the entire tenant topology to anyone visiting an unknown
      # subdomain. Re-enable only behind proper auth (BasicAuth middleware or
      # SSH tunnel) if debugging is needed.
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-public"
      # File provider for custom domains — API writes configs here, Traefik auto-reloads
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge=true"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.cloudflare.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      # Default wildcard cert for all *.cozypane.com subdomains
      - "--entrypoints.websecure.http.tls.certresolver=cloudflare"
      - "--entrypoints.websecure.http.tls.domains[0].main=${DOMAIN:-cozypane.com}"
      - "--entrypoints.websecure.http.tls.domains[0].sans=*.${DOMAIN:-cozypane.com}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
      - traefik-dynamic:/etc/traefik/dynamic
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      # Wildcard certificate is served via the websecure entrypoint's default TLS
      # config (see the --entrypoints.websecure.http.tls.domains flags above).
      # No wildcard catch-all router is needed — unknown subdomains fall through
      # to a 404, which is the intended behavior. Do NOT re-add a catch-all
      # router pointing at the Traefik dashboard; that leaks tenant topology.

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://cozypane:secret@postgres:5432/cozypane}
      - JWT_SECRET=${JWT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - DOMAIN=${DOMAIN:-cozypane.com}
      - ADMIN_GITHUB_CLIENT_ID=${ADMIN_GITHUB_CLIENT_ID}
      - ADMIN_GITHUB_CLIENT_SECRET=${ADMIN_GITHUB_CLIENT_SECRET}
      - NODE_ENV=production
      - TRAEFIK_DYNAMIC_DIR=/traefik-dynamic
      - GITHUB_TOKEN_ENCRYPTION_KEY=${GITHUB_TOKEN_ENCRYPTION_KEY}
      # M23: BullMQ queue backend. In-process worker + Queue both use this.
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DEPLOY_QUEUE_CONCURRENCY=${DEPLOY_QUEUE_CONCURRENCY:-4}
      - SENTRY_DSN=${SENTRY_DSN:-https://822e1904adbf05d9c4865a940356eec6@o4510985332391936.ingest.de.sentry.io/4511211127767120}
      - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
      # Persistent directory for uploaded tarball extracts. Survives API
      # container recreates so in-flight builds can resume after `docker
      # compose up -d --build api` (the case that orphaned deployment 110).
      - BUILD_DATA_DIR=/var/cozypane/builds
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - traefik-dynamic:/traefik-dynamic
      - builddata:/var/cozypane/builds
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cozypane-api.rule=Host(`api.${DOMAIN:-cozypane.com}`) || Host(`admin.${DOMAIN:-cozypane.com}`)"
      - "traefik.http.routers.cozypane-api.tls=true"
      - "traefik.http.routers.cozypane-api.entrypoints=websecure"
      - "traefik.http.services.cozypane-api.loadbalancer.server.port=3000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cozypane
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: cozypane
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cozypane -d cozypane"]
      interval: 5s
      timeout: 5s
      retries: 5

  # M23: Redis backs the BullMQ deploy build queue. In-process worker and
  # Queue producer both live inside the `api` container; Redis holds job
  # state + stalled-job recovery. Only reachable from the internal network,
  # never exposed publicly. Append-only persistence so queued jobs survive
  # Redis restarts.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  traefik-certs:
  traefik-dynamic:
  builddata:

networks:
  traefik-public:
    name: traefik-public
    driver: bridge
  internal:
    driver: bridge
