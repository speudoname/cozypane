<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      connect-src is restricted to 'self' because the renderer makes NO
      direct outbound network requests — all LLM/GitHub/Cozypane Cloud calls
      go through IPC handlers in the main process. Previously this was
      `'self' https:` which would have let an XSS exfiltrate filesystem
      contents (read via fs:readfile) to any HTTPS origin.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; worker-src blob:; font-src 'self' data:;">
    <title>CozyPane</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
