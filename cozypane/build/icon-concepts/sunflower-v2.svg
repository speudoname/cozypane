<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="petalWarm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5dc8a"/>
      <stop offset="50%" stop-color="#f0c95c"/>
      <stop offset="100%" stop-color="#e8a838"/>
    </linearGradient>
    <linearGradient id="petalPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b8af0"/>
      <stop offset="100%" stop-color="#7c6ef0"/>
    </linearGradient>
    <radialGradient id="center2" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#232438"/>
      <stop offset="100%" stop-color="#14152a"/>
    </radialGradient>
    <radialGradient id="bg2" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#252340"/>
      <stop offset="100%" stop-color="#1a1b2e"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg2)"/>

  <g transform="translate(256,256)">
    <!-- 8 rounded petals, more stylized -->
    <g fill="url(#petalWarm)">
      <rect x="-24" y="-160" width="48" height="100" rx="24" transform="rotate(0)"/>
      <rect x="-24" y="-160" width="48" height="100" rx="24" transform="rotate(45)"/>
      <rect x="-24" y="-160" width="48" height="100" rx="24" transform="rotate(90)"/>
      <rect x="-24" y="-160" width="48" height="100" rx="24" transform="rotate(135)"/>
      <rect x="-24" y="-160" width="48" height="100" rx="24" transform="rotate(180)"/>
      <rect x="-24" y="-160" width="48" height="100" rx="24" transform="rotate(225)"/>
      <rect x="-24" y="-160" width="48" height="100" rx="24" transform="rotate(270)"/>
      <rect x="-24" y="-160" width="48" height="100" rx="24" transform="rotate(315)"/>
    </g>

    <!-- 8 inner petals offset, purple tinted -->
    <g fill="url(#petalPurple)" opacity="0.5">
      <rect x="-18" y="-130" width="36" height="75" rx="18" transform="rotate(22.5)"/>
      <rect x="-18" y="-130" width="36" height="75" rx="18" transform="rotate(67.5)"/>
      <rect x="-18" y="-130" width="36" height="75" rx="18" transform="rotate(112.5)"/>
      <rect x="-18" y="-130" width="36" height="75" rx="18" transform="rotate(157.5)"/>
      <rect x="-18" y="-130" width="36" height="75" rx="18" transform="rotate(202.5)"/>
      <rect x="-18" y="-130" width="36" height="75" rx="18" transform="rotate(247.5)"/>
      <rect x="-18" y="-130" width="36" height="75" rx="18" transform="rotate(292.5)"/>
      <rect x="-18" y="-130" width="36" height="75" rx="18" transform="rotate(337.5)"/>
    </g>

    <!-- Center -->
    <circle cx="0" cy="0" r="70" fill="url(#center2)" stroke="#7c6ef0" stroke-width="3"/>

    <!-- Seed dot pattern in center -->
    <g fill="#333456" opacity="0.4">
      <circle cx="-20" cy="-25" r="4"/>
      <circle cx="5" cy="-30" r="3.5"/>
      <circle cx="25" cy="-18" r="4"/>
      <circle cx="-30" cy="-5" r="3.5"/>
      <circle cx="-10" cy="-8" r="4"/>
      <circle cx="15" cy="-10" r="3.5"/>
      <circle cx="33" cy="3" r="3"/>
      <circle cx="-25" cy="18" r="3.5"/>
      <circle cx="0" cy="15" r="4"/>
      <circle cx="22" cy="20" r="3.5"/>
      <circle cx="-15" cy="30" r="3"/>
      <circle cx="10" cy="35" r="3.5"/>
    </g>

    <!-- Terminal prompt >_ -->
    <text x="-36" y="14" font-family="SF Mono, Menlo, monospace" font-size="52" font-weight="700" fill="#7c6ef0">
      &gt;_
    </text>
  </g>
</svg>
