<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="petalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c95c"/>
      <stop offset="100%" stop-color="#e8a838"/>
    </linearGradient>
    <linearGradient id="petalGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5dc8a"/>
      <stop offset="100%" stop-color="#f0c95c"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1f35"/>
      <stop offset="100%" stop-color="#14152a"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2348"/>
      <stop offset="100%" stop-color="#1a1b2e"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bgGlow)"/>

  <!-- Outer petals (larger, behind) -->
  <g transform="translate(256,256)">
    <!-- 12 outer petals -->
    <g fill="url(#petalGrad)" opacity="0.7">
      <ellipse cx="0" cy="-130" rx="32" ry="70" transform="rotate(0)"/>
      <ellipse cx="0" cy="-130" rx="32" ry="70" transform="rotate(30)"/>
      <ellipse cx="0" cy="-130" rx="32" ry="70" transform="rotate(60)"/>
      <ellipse cx="0" cy="-130" rx="32" ry="70" transform="rotate(90)"/>
      <ellipse cx="0" cy="-130" rx="32" ry="70" transform="rotate(120)"/>
      <ellipse cx="0" cy="-130" rx="32" ry="70" transform="rotate(150)"/>
      <ellipse cx="0" cy="-130" rx="32" ry="70" transform="rotate(180)"/>
      <ellipse cx="0" cy="-130" rx="32" ry="70" transform="rotate(210)"/>
      <ellipse cx="0" cy="-130" rx="32" ry="70" transform="rotate(240)"/>
      <ellipse cx="0" cy="-130" rx="32" ry="70" transform="rotate(270)"/>
      <ellipse cx="0" cy="-130" rx="32" ry="70" transform="rotate(300)"/>
      <ellipse cx="0" cy="-130" rx="32" ry="70" transform="rotate(330)"/>
    </g>

    <!-- Inner petals (brighter, in front) -->
    <g fill="url(#petalGrad2)">
      <ellipse cx="0" cy="-110" rx="28" ry="58" transform="rotate(15)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="58" transform="rotate(45)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="58" transform="rotate(75)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="58" transform="rotate(105)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="58" transform="rotate(135)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="58" transform="rotate(165)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="58" transform="rotate(195)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="58" transform="rotate(225)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="58" transform="rotate(255)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="58" transform="rotate(285)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="58" transform="rotate(315)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="58" transform="rotate(345)"/>
    </g>

    <!-- Dark center circle (terminal screen) -->
    <circle cx="0" cy="0" r="75" fill="url(#centerGrad)" stroke="#333456" stroke-width="2"/>

    <!-- Terminal prompt >_ -->
    <text x="-38" y="12" font-family="SF Mono, Menlo, monospace" font-size="58" font-weight="700" fill="#7c6ef0">
      &gt;_
    </text>
  </g>
</svg>
