name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: cozypane

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: macos-latest
            platform: mac
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cozypane/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install setuptools (needed by node-gyp)
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build distributables
        run: npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            cozypane/release/*.dmg
            cozypane/release/*.zip
            cozypane/release/*.exe
            cozypane/release/*.AppImage
            cozypane/release/*.deb
            cozypane/release/*.rpm
            cozypane/release/latest*.yml
          if-no-files-found: error

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BUCKET="cozypane-downloads"

          for dir in ../artifacts/build-*/; do
            for file in "$dir"*; do
              [ -f "$file" ] || continue
              name=$(basename "$file")
              echo "Uploading $name..."
              wrangler r2 object put "${BUCKET}/v${VERSION}/${name}" --file="$file"
              wrangler r2 object put "${BUCKET}/latest/${name}" --file="$file"
            done
          done

      - name: Deploy landing page
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler pages deploy website/ --project-name=cozypane-site --commit-dirty=true

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/build-*/*.dmg
            artifacts/build-*/*.zip
            artifacts/build-*/*.exe
            artifacts/build-*/*.AppImage
            artifacts/build-*/*.deb
            artifacts/build-*/*.rpm
          generate_release_notes: true
