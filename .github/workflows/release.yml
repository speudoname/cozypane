name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: cozypane

jobs:
  build-mac:
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cozypane/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install setuptools (needed by node-gyp)
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci --force

      - name: Build app
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Import code signing certificate
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          echo "$MAC_CSC_LINK" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$MAC_CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm /tmp/cert.p12

      - name: Build distributables
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never -c.mac.target=zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-mac-${{ matrix.arch }}
          path: |
            cozypane/release/*.zip
          if-no-files-found: warn

      - name: Upload update metadata
        if: matrix.arch == 'arm64'
        uses: actions/upload-artifact@v4
        with:
          name: update-mac
          path: cozypane/release/latest-mac.yml
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cozypane/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install setuptools (needed by node-gyp)
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci --force

      - name: Build app
        run: npm run build

      - name: Build distributables
        run: npx electron-builder --linux --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-x64
          path: |
            cozypane/release/*.AppImage
            cozypane/release/*.deb
            cozypane/release/*.rpm
            cozypane/release/latest-linux.yml
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cozypane/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install setuptools (needed by node-gyp)
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci --force

      - name: Build app
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build distributables
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-win-x64
          path: |
            cozypane/release/*.exe
            cozypane/release/latest.yml
          if-no-files-found: warn

  release:
    needs: [build-mac, build-linux, build-windows]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find ../artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CozyPane ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/build-mac-arm64/*
            artifacts/build-mac-x64/*
            artifacts/build-linux-x64/*
            artifacts/build-win-x64/*
            artifacts/update-mac/*

  deploy-website:
    needs: release
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy cozypane/website --project-name=cozypane-site
