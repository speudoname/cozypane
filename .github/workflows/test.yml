name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-cloud:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cozypane-cloud
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cozypane-cloud/package-lock.json
      - run: npm ci
      - run: npm test

  test-desktop-main:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cozypane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cozypane/package-lock.json
      - run: npm ci --ignore-scripts --force
      - run: npm run test:main

  test-desktop-renderer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cozypane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cozypane/package-lock.json
      - run: npm ci --ignore-scripts --force
      - run: npm run test:renderer
